<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Instrumentos</title>
    <link rel="stylesheet" href="./css/catalogo.css">
</head>
<body>

    

    <div class="container">
        <!-- Card do Repique -->
        <div class="card">
            <div class="imagem">
                <img src="./img/repique.webp" alt="Repique de Mão">
            </div>
            <div class="text">
                <h2>Repique de Mão</h2>
                <p>R$ 250,00</p>
                <button>Comprar</button>
            </div>
        </div>

        <!-- Card de Surdo -->
        <div class="card">
            <div class="imagem">
                <img src="./img/surdo.webp" alt="Surdo">
            </div>
            <div class="text">
                <h2>Surdo</h2>
                <p>R$ 400,00</p>
                <button>Comprar</button>
            </div>
        </div>

        <!-- Card de Caixa -->
        <div class="card">
            <div class="imagem">
                <img src="./img/pandeiro.webp" alt="Caixa">
            </div>
            <div class="text">
                <h2>Caixa</h2>
                <p>R$ 300,00</p>
                <button>Comprar</button>
            </div>
        </div>
    </div>

</body>
</html>
