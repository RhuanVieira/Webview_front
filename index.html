<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Instrumentos</title>
<style>
    /* ===== ROOT COLORS ===== */
    :root {
        --primary: #f25c05;
        --bg: #f2f2f2;
        --card-bg: #fff;
        --text-color: #333;
        --subtext-color: #666;
        --border-radius: 16px;
        --shadow: 0 4px 12px rgba(0,0,0,0.1);
    }

    /* ===== RESET ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background: var(--bg);
        color: var(--text-color);
    }

    /* ===== HEADER ===== */
    header {
        position: sticky;
        top: 0;
        background: var(--primary);
        color: #fff;
        text-align: center;
        padding: 20px 0;
        font-size: 1.5rem;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        z-index: 10;
    }

    /* ===== CONTAINER ===== */
    .container {
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 480px;
        margin: 0 auto;
    }

    /* ===== CARD ===== */
    .card {
        background: var(--card-bg);
        border-radius: var(--border-radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .card .imagem {
        width: 100%;
        height: 180px;
        overflow: hidden;
    }

    .card .imagem img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s;
    }

    .card:hover .imagem img {
        transform: scale(1.05);
    }

    .card .text {
        padding: 15px;
        text-align: center;
    }

    .card .text h2 {
        font-size: 1.2rem;
        margin-bottom: 8px;
    }

    .card .text p {
        color: var(--primary);
        font-weight: bold;
        margin-bottom: 12px;
        font-size: 1rem;
    }

    .card .text button {
        padding: 12px 25px;
        font-size: 1rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s;
    }

    .card .text button:hover {
        background: #d14a00;
    }

    /* ===== NAVBAR BOTTOM ===== */
    nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 480px;
        background: #fff;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
    }

    nav a {
        text-decoration: none;
        color: var(--text-color);
        font-size: 0.9rem;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    nav a svg {
        width: 24px;
        height: 24px;
        margin-bottom: 3px;
    }

    /* ===== RESPONSIVE ===== */
    @media (min-width: 500px) {
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .card {
            width: 220px;
        }
    }

</style>
</head>
<body>

<header>Loja de Instrumentos</header>

<div class="container">
    <!-- Card Repique -->
    <div class="card">
        <div class="imagem">
            <img src="./img/repique.webp" alt="Repique de Mão">
        </div>
        <div class="text">
            <h2>Repique de Mão</h2>
            <p>R$ 250,00</p>
            <button>Comprar</button>
        </div>
    </div>

    <!-- Card Surdo -->
    <div class="card">
        <div class="imagem">
            <img src="./img/surdo.webp" alt="Surdo">
        </div>
        <div class="text">
            <h2>Surdo</h2>
            <p>R$ 400,00</p>
            <button>Comprar</button>
        </div>
    </div>

    <!-- Card Caixa -->
    <div class="card">
        <div class="imagem">
            <img src="./img/caixa.webp" alt="Caixa">
        </div>
        <div class="text">
            <h2>Caixa</h2>
            <p>R$ 300,00</p>
            <button>Comprar</button>
        </div>
    </div>
</div>

<!-- Navbar estilo app -->
<nav>
    <a href="#"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7v6c0 5 4 10 10 10s10-5 10-10V7l-10-5z"/></svg>Home</a>
    <a href="#"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Perfil</a>
    <a href="#"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2-.9-2-2h2v2zm0-4H5V7h2v7zm10 4c0 1.1-.9 2-2 2v-2h2zm0-4h-2V7h2v7z"/></svg>Carrinho</a>
</nav>

</body>
</html>
